<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Top of Talent</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
    }

    #inicioFrame {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Intro -->
  <iframe src="intro.html" id="introFrame"></iframe>

  <!-- Sitio principal -->
  <iframe src="inicio.html" id="inicioFrame"></iframe>

  <script>
    const DURACION_INTRO = 5000; // ajusta el tiempo

    setTimeout(() => {
      document.getElementById("introFrame").style.display = "none";
      document.getElementById("inicioFrame").style.display = "block";
    }, DURACION_INTRO);
  </script>

</body>
</html>
