<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+ Black Sessions — Top of Talent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Helvetica,'Helvetica Neue',Arial,sans-serif;background:#f0d800;color:#000;cursor:none;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:40px}

.cursor{position:fixed;width:8px;height:8px;background:#000;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .18s,height .18s}
.cursor-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(0,0,0,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .1s ease}

.back-btn{
  display:inline-flex;align-items:center;gap:10px;
  font-size:12px;font-weight:700;letter-spacing:.22em;
  color:rgba(0,0,0,.55);text-decoration:none;text-transform:uppercase;
  cursor:none;transition:color .2s;align-self:flex-start;
}
.back-btn:hover{color:#000}

.content{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;gap:32px;
}

.top-text{
  font-size:clamp(18px,3.5vw,40px);
  font-weight:700;text-transform:uppercase;letter-spacing:-.01em;line-height:1.2;
}

.prox{
  font-size:clamp(40px,7vw,88px);
  font-weight:700;text-transform:uppercase;letter-spacing:-.02em;line-height:1;
}

.main-title{
  font-size:clamp(52px,10vw,140px);
  font-weight:700;text-transform:uppercase;letter-spacing:-.03em;line-height:.9;
}

.bottom-text{
  font-size:clamp(16px,3vw,36px);
  font-weight:700;text-transform:uppercase;letter-spacing:-.01em;line-height:1.25;
}

.credit{
  font-size:clamp(9px,1.2vw,13px);
  font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(0,0,0,.5);line-height:1.5;
}

.logo-icon{width:36px;height:36px;object-fit:contain;display:block;filter:invert(1)}
.logo-inv{filter:invert(1)}

.footer-legal a{cursor:none!important}
.footer-legal a:hover{color:#c86cff}
</style>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="rng"></div>

<div style="display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;padding:24px 40px;z-index:100">
  <a href="inicio.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
    <img src="logo.png" style="width:36px;height:36px;object-fit:contain" alt="Top of Talent">
    <span style="font-family:Helvetica,Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:.2em;color:#000;text-transform:uppercase;line-height:1.35">Top of<br>Talent</span>
  </a>
  <a href="proyectos.html" class="back-btn">← Proyectos</a>
  <div style="width:44px"></div>
</div>

<div class="content">
  <p class="top-text">Vamos a poner a prueba<br>el talento</p>
  <p class="prox">Próximamente</p>
  <h1 class="main-title">+Black Sessions</h1>
  <p class="bottom-text">Una experiencia donde el<br>talento se demuestra</p>
  <p class="credit">Una idea original de<br>Top of Talent</p>
</div>

<div></div>

<script>
var cur=document.getElementById('cur'),rng=document.getElementById('rng');
var mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;rng.style.left=rx+'px';rng.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a').forEach(function(el){
  el.addEventListener('mouseenter',function(){cur.style.width='14px';cur.style.height='14px';});
  el.addEventListener('mouseleave',function(){cur.style.width='8px';cur.style.height='8px';});
});
</script>
<script src="legal.js"></script>
<script src="auth.js"></script>

    <a href="#" data-legal="terminos" style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.12em;color:rgba(0,0,0,.4);text-decoration:none;text-transform:uppercase">Términos</a>
    <a href="#" data-legal="privacidad" style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.12em;color:rgba(0,0,0,.4);text-decoration:none;text-transform:uppercase">Privacidad</a>
    <a href="#" data-legal="cookies" style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.12em;color:rgba(0,0,0,.4);text-decoration:none;text-transform:uppercase">Cookies</a>
  </div>
</div>
</body>
</html>
